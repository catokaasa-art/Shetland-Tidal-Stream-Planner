  {id:"papa",name:"Sound of Papa",lat:60.31262,lon:-1.66162,sev:"high",streams:[{dir:"SW",hw:-235,lbl:"HW\u22123:55",fair:"south",deg:225},{dir:"NE",hw:235,lbl:"HW+3:55",fair:"north",deg:45}],warn:"3\u20135 kn springs"},
  {id:"linga",name:"Linga Sound",lat:60.35792,lon:-1.02519,sev:"high",streams:[{dir:"S",hw:-270,lbl:"HW\u22124:30",fair:"south",deg:180},{dir:"N",hw:135,lbl:"HW+2:15",fair:"north",deg:0}],warn:"5\u20136 kn springs"},
  {id:"yell-ew",name:"Yell Sound E/W",lat:60.47318,lon:-1.13175,sev:"medium",streams:[{dir:"E",hw:-265,lbl:"HW\u22124:25",fair:"south",deg:90},{dir:"W",hw:5,lbl:"HW+0:05",fair:"north",deg:270}],warn:"2\u20133 kn. Eddy along Yell coast"},
  {id:"yell-ns",name:"Yell Sound N/S",lat:60.53231,lon:-1.23703,sev:"extreme",streams:[{dir:"S",hw:-325,lbl:"HW\u22125:25",fair:"south",deg:180},{dir:"N",hw:65,lbl:"HW+1:05",fair:"north",deg:0}],warn:"The Rumble! 6\u20137 kn springs!"},
  {id:"blueS",name:"Bluemull South",lat:60.61222,lon:-0.95856,sev:"extreme",streams:[{dir:"S",hw:365,lbl:"HW+6:05",fair:"south",deg:180},{dir:"N",hw:-25,lbl:"HW\u22120:25",fair:"north",deg:0}],warn:"Opposite to main sound! 6\u20137 kn"},
  {id:"blueC",name:"Bluemull Main",lat:60.68271,lon:-0.98930,sev:"extreme",streams:[{dir:"S",hw:-265,lbl:"HW\u22124:25",fair:"south",deg:180},{dir:"N",hw:95,lbl:"HW+1:35",fair:"north",deg:0}],warn:"Breaking waves! 6\u20137 kn springs!"},
  {id:"unstN",name:"Unst North",lat:60.83692,lon:-0.76080,sev:"warning",streams:[],warn:"Strong currents and seas! Check conditions."},
];
const DFLT=[{lat:60.154,lon:-1.141,d:0},{lat:60.263,lon:-1.090,d:7.0},{lat:60.352,lon:-1.064,d:12.4},{lat:60.448,lon:-1.039,d:18.2},{lat:60.487,lon:-1.155,d:22.6},{lat:60.521,lon:-1.189,d:24.9},{lat:60.581,lon:-1.212,d:28.6},{lat:60.654,lon:-1.172,d:33.1},{lat:60.610,lon:-1.120,d:37.1}];

// ═══ HELPERS ═══
const toM=s=>{if(!s)return null;const[h,m]=s.split(":").map(Number);return h*60+m;};
const fmT=m=>{if(m==null)return"--:--";const v=Math.round(((m%1440)+1440)%1440);return`${String(Math.floor(v/60)).padStart(2,"0")}:${String(v%60).padStart(2,"0")}`;};
const adj=(d,o)=>{const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+o);return dt.toISOString().slice(0,10);};
const allHWFor=date=>{let a=[];[[-1,-1440],[0,0],[1,1440]].forEach(([off,m])=>{const t=gT(adj(date,off));if(t)t.hw.forEach(e=>a.push(toM(e.time)+m));});return a;};
const gRange=t=>{if(!t)return null;const h=Math.max(...t.hw.map(e=>e.height)),l=Math.min(...t.lw.map(e=>e.height));return h-l;};
const sFact=r=>r==null?null:Math.max(0,Math.min(1,(r-0.7)/0.9));
const sClk=(allHW,off)=>allHW.map(hw=>hw+off).filter(t=>t>=0&&t<1440).sort((a,b)=>a-b).map(fmT).join(" / ");
const hav=(a,b,c,d)=>{const R=3440.065,dl=Math.PI/180*(c-a),dn=Math.PI/180*(d-b),x=Math.sin(dl/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dn/2)**2;return 2*R*Math.asin(Math.sqrt(x));};
const matchP=rp=>PASSAGES.map(p=>{let bd=Infinity,brd=0;for(let i=0;i<rp.length-1;i++){const a=rp[i],b=rp[i+1];for(let t=0;t<=1;t+=.1){const la=a.lat+t*(b.lat-a.lat),lo=a.lon+t*(b.lon-a.lon),d=hav(p.lat,p.lon,la,lo);if(d<bd){bd=d;brd=a.d+t*(b.d-a.d);}}}return{...p,rd:Math.round(brd*10)/10,px:Math.round(bd*10)/10,on:bd<3,near:bd<6};}).sort((a,b)=>a.rd-b.rd);
const parseGPX=t=>{const d=new DOMParser().parseFromString(t,"text/xml");let pts=[];d.querySelectorAll("rtept,trkpt").forEach(x=>pts.push({lat:+x.getAttribute("lat"),lon:+x.getAttribute("lon")}));if(pts.length<2)return null;let tot=0;const res=[{lat:pts[0].lat,lon:pts[0].lon,d:0}];for(let i=1;i<pts.length;i++){const dl=Math.PI/180*(pts[i].lat-pts[i-1].lat),dn=Math.PI/180*(pts[i].lon-pts[i-1].lon),x=Math.sin(dl/2)**2+Math.cos(pts[i-1].lat*Math.PI/180)*Math.cos(pts[i].lat*Math.PI/180)*Math.sin(dn/2)**2;tot+=2*3440.065*Math.asin(Math.sqrt(x));if(i%3===0||i===pts.length-1)res.push({lat:pts[i].lat,lon:pts[i].lon,d:Math.round(tot*100)/100});}return{points:res,totalDist:Math.round(tot*10)/10};};

// ═══ WIND ═══
const DIRS=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
const deg2c=d=>DIRS[Math.round(d/22.5)%16];
const windVsTide=(wFrom,cDeg)=>{if(wFrom==null||cDeg==null)return false;let d=Math.abs(wFrom-cDeg);if(d>180)d=360-d;return d<60;};
const fetchWind=(date,set)=>{
  fetch("https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=60.45&lon=-1.10",{headers:{"User-Agent":"ShetlandPassagePlanner/1.0"}})
  .then(r=>r.json()).then(data=>{
    const hrs=data.properties.timeseries.slice(0,48).map(ts=>{const t=new Date(ts.time),i=ts.data.instant.details;return{hour:(t.getUTCHours()+1)%24,speed:i.wind_speed,gust:i.wind_speed_of_gust||null,from:i.wind_from_direction};});
    set({src:"MET Norway",hrs});
  }).catch(()=>{
    const hrs=[];for(let h=0;h<24;h++)hrs.push({hour:h,speed:8+Math.sin(h/4)*4,gust:12+Math.sin(h/4)*5,from:210+Math.sin(h/6)*30});
    set({src:"Mock (API blocked in sandbox)",hrs});
  });
};
const windAt=(w,h)=>{if(!w)return null;const hr=Math.round(h)%24;return w.hrs.find(x=>x.hour===hr)||w.hrs[0];};

// ═══ PASSAGE CHECK ═══
const checkP=(p,eta,allHW,dir)=>{
  if(!p.streams.length)return{light:"warning",txt:p.warn,stream:null};
  const ch=[];p.streams.forEach(s=>allHW.forEach(hw=>ch.push({t:hw+s.hw,dir:s.dir,fair:s.fair,deg:s.deg})));
  ch.sort((a,b)=>a.t-b.t);
  let nd=Infinity,nDir="";ch.forEach(c=>{const d=Math.abs(eta-c.t);if(d<nd){nd=d;nDir=c.dir;}});
  const dm=Math.round(nd);
  let active=null;for(let i=ch.length-1;i>=0;i--)if(ch[i].t<=eta){active=ch[i];break;}
  const fair=active&&active.fair===dir;
  if(dm<=45)return{light:"green",txt:`SLACK (\u00b1${dm}min)`,stream:active};
  if(dm<=90)return{light:"yellow",txt:fair?"Near slack, fair building":"Near slack, foul building",stream:active};
  if(fair)return{light:"yellow",txt:`FAIR TIDE ${active.dir}-going`,stream:active};
  return{light:"red",txt:`FOUL TIDE ${active?active.dir+"-going":""}`,stream:active};
};

// ═══ SPRING CHART ═══
function SpringChart({date}){
  const days=useMemo(()=>{const d=new Date(date+"T12:00:00"),r=[];for(let i=-10;i<=20;i++){const nd=new Date(d);nd.setDate(nd.getDate()+i);const ds=nd.toISOString().slice(0,10),t=gT(ds),rng=gRange(t);r.push({date:ds,range:rng,sf:sFact(rng),day:nd.getDate(),mon:nd.getMonth()+1,sel:ds===date});}return r;},[date]);
  const sel=days.find(d=>d.sel);const sf=sel?sel.sf:null;
  const snCol=sf==null?"#475569":sf>.7?"#ef4444":sf>.3?"#eab308":"#22c55e";
  const snLbl=sf==null?"":sf>.7?"Springs":sf>.3?"Moderate":"Neaps";
  const W=580,H=100,P=28,bW=(W-2*P)/days.length;
  return(<div className="glass" style={{padding:"8px 10px",marginBottom:8}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <span style={{fontSize:11,color:"#94a3b8",fontWeight:600}}>Spring / Neap</span>
      <span style={{fontSize:12,fontWeight:800,color:snCol}}>{snLbl}</span>
    </div>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%"}}>
      {days.map((d,i)=>{if(!d.range)return null;const x=P+i*bW,h2=(d.range/2.2)*(H-2*P),y=H-P-h2,s=d.sf||0,c=s>.7?"#ef4444":s>.3?"#eab308":"#22c55e";
      return <g key={d.date}><rect x={x+1} y={y} width={bW-2} height={h2} fill={c} opacity={d.sel?1:.35} rx={1}/>{d.sel&&<rect x={x-1} y={y-2} width={bW+2} height={h2+4} fill="none" stroke="#60a5fa" strokeWidth={2} rx={2}/>}{(d.day===1||d.day===15||d.sel)&&<text x={x+bW/2} y={H-2} fill={d.sel?"#60a5fa":"rgba(148,163,184,.35)"} fontSize={d.sel?7:6} textAnchor="middle" fontFamily="monospace" fontWeight={d.sel?700:400}>{d.day}/{d.mon}</text>}</g>;})}
      <line x1={P} y1={H-P-(1.6/2.2)*(H-2*P)} x2={W-P} y2={H-P-(1.6/2.2)*(H-2*P)} stroke="rgba(239,68,68,.2)" strokeDasharray="3 3"/>
      <line x1={P} y1={H-P-(.7/2.2)*(H-2*P)} x2={W-P} y2={H-P-(.7/2.2)*(H-2*P)} stroke="rgba(34,197,94,.2)" strokeDasharray="3 3"/>
      <text x={W-P+3} y={H-P-(1.6/2.2)*(H-2*P)+3} fill="rgba(239,68,68,.4)" fontSize={6}>Springs</text>
      <text x={W-P+3} y={H-P-(.7/2.2)*(H-2*P)+3} fill="rgba(34,197,94,.4)" fontSize={6}>Neaps</text>
    </svg>
  </div>);
}

// ═══ TIDAL CURVE ═══
function TidalCurve({tides,marker}){
  if(!tides)return null;
  const ev=[];tides.hw.forEach(e=>ev.push({m:toM(e.time),t:"HW"}));tides.lw.forEach(e=>ev.push({m:toM(e.time),t:"LW"}));ev.sort((a,b)=>a.m-b.m);
  if(ev.length<2)return null;
  const W=600,H=55,P=28,sx=t=>P+(t/1440)*(W-2*P),sy=t=>t==="HW"?10:H-10;
  const pts=ev.map(e=>({x:sx(e.m),y:sy(e.t)}));
  let d=`M ${pts[0].x} ${pts[0].y}`;for(let i=1;i<pts.length;i++){const cx=(pts[i-1].x+pts[i].x)/2;d+=` C ${cx} ${pts[i-1].y}, ${cx} ${pts[i].y}, ${pts[i].x} ${pts[i].y}`;}
  return <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%"}}>{[0,6,12,18,24].map(h=><g key={h}><line x1={sx(h*60)} y1={4} x2={sx(h*60)} y2={H-4} stroke="rgba(148,163,184,.07)"/><text x={sx(h*60)} y={H} fill="rgba(148,163,184,.2)" fontSize={7} textAnchor="middle" fontFamily="monospace">{String(h%24).padStart(2,"0")}</text></g>)}<path d={d} fill="none" stroke="#60a5fa" strokeWidth={2}/>{ev.map((e,i)=><g key={i}><circle cx={sx(e.m)} cy={sy(e.t)} r={3} fill={e.t==="HW"?"#3b82f6":"#1e40af"} stroke="#0f172a" strokeWidth={1}/><text x={sx(e.m)} y={sy(e.t)+(e.t==="HW"?-6:10)} fill="#94a3b8" fontSize={6.5} textAnchor="middle" fontFamily="monospace">{e.t} {fmT(e.m)}</text></g>)}{marker!=null&&<line x1={sx(marker)} y1={4} x2={sx(marker)} y2={H-6} stroke="#f59e0b" strokeWidth={1.5} strokeDasharray="3 2"/>}</svg>;
}

// ═══ MAP ═══
function LMap({rp,matched,depM,allHW,speed,routeDir}){
  const ref=useRef(),mapR=useRef(),lyR=useRef([]);
  useEffect(()=>{if(mapR.current)return;if(!window.L||!ref.current)return;const m=L.map(ref.current).setView([60.45,-1.1],9);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:15,attribution:"\u00a9 OSM"}).addTo(m);mapR.current=m;},[]);
  const draw=useCallback(()=>{
    if(!mapR.current)return;const m=mapR.current;lyR.current.forEach(l=>m.removeLayer(l));lyR.current=[];
    const add=l=>{lyR.current.push(l.addTo(m));return l;};
    const ll=rp.map(p=>[p.lat,p.lon]);
    add(L.polyline(ll,{color:"#1e40af",weight:8,opacity:.2}));add(L.polyline(ll,{color:"#3b82f6",weight:3,opacity:.9}));
    matched.forEach(p=>{
      if(!p.on&&!p.near)return;
      const eta=depM!=null&&p.on?Math.round(depM+(p.rd/speed)*60):null;
      const chk=eta!=null?checkP(p,eta,allHW,routeDir):{light:p.sev==="warning"?"warning":"unk"};
      const col=({green:"#22c55e",yellow:"#eab308",red:"#dc2626",warning:"#f59e0b"})[chk.light]||"#64748b";
      const sz=p.on?18:12;
      const ic=L.divIcon({className:"",html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:2px solid #0f172a;opacity:${p.on?1:.4}"></div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
      add(L.marker([p.lat,p.lon],{icon:ic})).bindTooltip(`<b style="color:${col}">${p.name}</b>${eta!=null?`<br>ETA: ${fmT(eta)}<br>${chk.txt}`:""}`,{direction:"right"});
      if(depM!=null&&p.on&&eta!=null){const lb=L.divIcon({className:"",html:`<div style="background:${col}dd;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;font-family:monospace">${fmT(eta)}</div>`,iconSize:[0,0],iconAnchor:[-sz/2-4,8]});add(L.marker([p.lat,p.lon],{icon:lb,interactive:false}));}
    });
    if(ll.length>1)m.fitBounds(ll,{padding:[40,40]});
  },[rp,matched,depM,allHW,speed,routeDir]);
  useEffect(()=>{if(mapR.current)draw();},[draw]);
  return <div ref={ref} style={{width:"100%",height:420,borderRadius:12,border:"1px solid rgba(100,116,139,.12)",overflow:"hidden",background:"#1a2744"}}/>;
}

// ═══ WIND BADGE ═══
function WindBadge({w,stream}){
  if(!w)return <span style={{fontSize:9,color:"#475569"}}>No wind data</span>;
  const spd=Math.round(w.speed),gust=w.gust?Math.round(w.gust):null,from=Math.round(w.from);
  const wCol=spd>=25?"#dc2626":spd>=15?"#eab308":"#94a3b8";
  const wat=stream&&stream.deg!=null&&spd>=10&&windVsTide(from,stream.deg);
  return <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
    <span style={{fontSize:14,color:wCol,transform:`rotate(${from+180}deg)`,display:"inline-block"}}>{"\u2191"}</span>
    <span style={{fontSize:11,fontWeight:700,fontFamily:"monospace",color:wCol}}>{spd}kn</span>
    {gust&&gust>spd+3&&<span style={{fontSize:9,color:"#64748b"}}>G{gust}</span>}
    <span style={{fontSize:9,color:"#64748b"}}>{deg2c(from)}</span>
    {wat&&<span style={{fontSize:8,fontWeight:700,color:"#dc2626",background:"rgba(220,38,38,.12)",padding:"2px 6px",borderRadius:4}}>WIND vs TIDE!</span>}
  </div>;
}

// ═══ APP ═══
function App(){
  const[date,setDate]=useState("2026-07-15");
  const[depT,setDepT]=useState("");
  const[speed,setSpeed]=useState(6.5);
  const[gpx,setGpx]=useState(null);
  const[wind,setWind]=useState(null);

  const tides=useMemo(()=>gT(date),[date]);
  const allHW=useMemo(()=>allHWFor(date),[date]);
  const depM=depT?toM(depT):null;
  const rp=gpx?gpx.points:DFLT;
  const routeDir=rp.length>=2&&rp[rp.length-1].lat>rp[0].lat?"north":"south";
  const matched=useMemo(()=>matchP(rp),[rp]);
  const onRoute=matched.filter(p=>p.on);
  const nearby=matched.filter(p=>p.near&&!p.on);

  useEffect(()=>{fetchWind(date,setWind);},[date]);

  const lCol=lv=>({green:"#22c55e",yellow:"#eab308",red:"#dc2626",warning:"#f59e0b"})[lv]||"#64748b";

  return <div style={{padding:"12px 10px",maxWidth:600,margin:"0 auto"}}>
    <h1 style={{fontSize:19,fontWeight:800,textAlign:"center",color:"#60a5fa",marginBottom:10,letterSpacing:"-.3px"}}>Shetland Passage Planner</h1>

    <div className="glass" style={{padding:12,marginBottom:8}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
        <div><div style={{fontSize:10,color:"#64748b",marginBottom:3,fontWeight:600}}>DATE</div><input className="inp" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div><div style={{fontSize:10,color:"#64748b",marginBottom:3,fontWeight:600}}>DEPARTURE</div><input className="inp" type="time" value={depT} onChange={e=>setDepT(e.target.value)}/></div>
        <div><div style={{fontSize:10,color:"#64748b",marginBottom:3,fontWeight:600}}>SPEED (KN)</div><input className="inp" type="number" value={speed} min={1} max={12} step={.5} onChange={e=>setSpeed(+e.target.value)}/></div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
        <label style={{fontSize:10,color:"#60a5fa",cursor:"pointer",background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.2)",borderRadius:6,padding:"4px 10px",fontWeight:700}}>Upload GPX<input type="file" accept=".gpx" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const res=parseGPX(ev.target.result);if(res)setGpx(res);}catch(e){}};r.readAsText(f);}} style={{display:"none"}}/></label>
        <span style={{fontSize:10,color:gpx?"#86efac":"#475569"}}>{gpx?gpx.totalDist+" NM":"Default: 37.4 NM"}</span>
        <span style={{fontSize:10,color:"#60a5fa",fontWeight:700}}>{routeDir==="north"?"\u2191 Northbound":"\u2193 Southbound"}</span>
        {wind&&<span style={{fontSize:8,color:"#475569",marginLeft:"auto"}}>{wind.src}</span>}
      </div>
      <SpringChart date={date}/>
      {tides?<TidalCurve tides={tides} marker={depM}/>:<div style={{fontSize:11,color:"#f59e0b",textAlign:"center",padding:8}}>Select May\u2013Sep 2026</div>}
    </div>

    {tides&&<LMap rp={rp} matched={matched} depM={depM} allHW={allHW} speed={speed} routeDir={routeDir}/>}

    {tides&&onRoute.length>0&&<div style={{marginTop:10}}>
      {!depM&&<div style={{fontSize:11,color:"#64748b",textAlign:"center",padding:10,background:"rgba(15,23,42,.3)",borderRadius:8,marginBottom:8}}>Set departure time to see passage assessment</div>}
      {onRoute.map((p,idx)=>{
        const eta=depM!=null?Math.round(depM+(p.rd/speed)*60):null;
        const chk=eta!=null?checkP(p,eta,allHW,routeDir):{light:p.sev==="warning"?"warning":"unk",txt:"",stream:null};
        const col=lCol(chk.light);
        const w=eta!=null?windAt(wind,Math.floor((eta%1440)/60)):null;
        return <div key={p.id} className="fade-up" style={{animationDelay:idx*60+"ms",padding:"10px 12px",marginBottom:5,borderLeft:`3px solid ${col}`,borderRadius:8,background:`${col}06`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:700}}>{p.name}</span>
            <span style={{fontSize:9,color:"#64748b",fontFamily:"monospace"}}>{p.rd} NM</span>
          </div>
          {eta!=null&&p.streams.length>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,padding:"6px 10px",background:`${col}0e`,borderRadius:6}}>
            <span style={{width:10,height:10,borderRadius:"50%",background:col,flexShrink:0,boxShadow:`0 0 8px ${col}66`}}/>
            <span style={{fontSize:16,fontWeight:800,fontFamily:"monospace",color:col}}>{fmT(eta)}</span>
            <span style={{fontSize:10,color:col,fontWeight:600}}>{chk.txt}</span>
          </div>}
          {eta!=null&&<div style={{marginBottom:4,padding:"4px 10px",background:"rgba(100,116,139,.04)",borderRadius:5}}>
            <WindBadge w={w} stream={chk.stream}/>
          </div>}
          {p.streams.length>0&&<div style={{fontSize:9,color:"#64748b",lineHeight:1.7}}>
            {p.streams.map((s,i)=><div key={i}>{s.dir}-going starts: <span style={{fontFamily:"monospace",fontWeight:600}}>{sClk(allHW,s.hw)||s.lbl}</span></div>)}
          </div>}
          {p.sev==="warning"&&<div style={{fontSize:10,color:"#f59e0b",fontWeight:600,marginTop:2}}>{p.warn}</div>}
          {eta!=null&&chk.light==="red"&&<div style={{fontSize:9,color:"#fca5a5",marginTop:3}}>{p.warn}</div>}
        </div>;
      })}
    </div>}

    {tides&&nearby.length>0&&<div style={{marginTop:8}}>
      <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginBottom:4}}>Nearby ({nearby.length})</div>
      {nearby.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",marginBottom:3,borderLeft:"2px solid rgba(251,191,36,.25)",borderRadius:6,opacity:.6}}>
        <span style={{fontSize:10,fontFamily:"monospace",color:"#64748b"}}>{p.px}NM</span>
        <span style={{fontSize:10,color:"#94a3b8"}}>{p.name}</span>
      </div>)}
    </div>}

    <div style={{marginTop:14,padding:10,background:"rgba(15,23,42,.3)",borderRadius:8,fontSize:9,color:"#64748b",lineHeight:1.7}}>
      <div style={{fontWeight:700,color:"#94a3b8",marginBottom:3}}>Traffic lights</div>
      <span style={{color:"#22c55e"}}>Green</span> = SLACK, \u00b145min from change. <span style={{color:"#eab308"}}>Yellow</span> = \u00b190min or FAIR TIDE. <span style={{color:"#dc2626"}}>Red</span> = FOUL TIDE.
      <br/><span style={{color:"#dc2626"}}>WIND vs TIDE</span> = wind opposing current. Expect steep seas!
      <br/>Stream times ref HW Lerwick (BST). Wind: MET Norway. Decision support only!
      <br/><br/><span style={{fontWeight:700,color:"#94a3b8"}}>Data coverage</span>
      <br/>Tides: UKHO Lerwick, <span style={{color:"#e2e8f0"}}>1 May &ndash; 30 Sep 2026</span> only.
      <br/>Always verify with official charts and tidal atlas!
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
